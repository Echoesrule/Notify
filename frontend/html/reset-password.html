<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../images/dashboardImages/education.png">
    <title>Reset Password - Notify</title>
    <link href="https://fonts.googleapis.com/css?family=Fredoka|Inter&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="../css/login.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; }
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
        }
        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px;
        }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header i { font-size: 48px; color: var(--primary); margin-bottom: 15px; }
        .auth-header h1 { font-size: 24px; margin-bottom: 8px; }
        .auth-header p { color: var(--text-secondary); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .password-input { position: relative; }
        .password-input input { width: 100%; padding: 12px 45px 12px 15px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; }
        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-secondary); }
        .error-msg { background: #fef2f2; color: var(--error); padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; }
        .success-msg { background: #f0fdf4; color: var(--success); padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; }
        .btn-primary { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        .btn-primary:hover { background: var(--primary-hover); }
        .auth-footer { text-align: center; margin-top: 20px; }
        .auth-footer a { color: var(--primary); text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-lock"></i>
                <h1>Reset Password</h1>
                <p>Enter your new password</p>
            </div>
            
            <form id="resetForm" class="auth-form">
                <div class="form-group">
                    <label>New Password</label>
                    <div class="password-input">
                        <input type="password" id="newPassword" placeholder="Enter new password" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('newPassword')"></i>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="password-input">
                        <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('confirmPassword')"></i>
                    </div>
                </div>
                
                <div id="errorMsg" class="error-msg" style="display: none;"></div>
                <div id="successMsg" class="success-msg" style="display: none;"></div>
                
                <button type="submit" class="btn-primary">
                    <i class="fas fa-key"></i> Reset Password
                </button>
            </form>
            
            <div class="auth-footer">
                <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script>
        const form = document.getElementById('resetForm');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (!token) {
            errorMsg.textContent = 'Invalid reset link. Please request a new password reset.';
            errorMsg.style.display = 'block';
            form.style.display = 'none';
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            if (newPassword.length < 6) {
                errorMsg.textContent = 'Password must be at least 6 characters';
                errorMsg.style.display = 'block';
                return;
            }
            
            if (newPassword !== confirmPassword) {
                errorMsg.textContent = 'Passwords do not match';
                errorMsg.style.display = 'block';
                return;
            }
            
            try {
                const res = await fetch(`${API_URL}/user_auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    successMsg.textContent = data.message;
                    successMsg.style.display = 'block';
                    form.style.display = 'none';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    errorMsg.textContent = data.message;
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'An error occurred. Please try again.';
                errorMsg.style.display = 'block';
            }
        });
        
        function togglePassword(id) {
            const input = document.getElementById(id);
            const icon = input.nextElementSibling;
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
